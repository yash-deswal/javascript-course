<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    <button onclick="
      playGame('Rock');
    ">Rock</button>
    <button onclick="
      playGame('Paper');
    ">Paper</button>
    <button onclick="
      playGame('Scissors');
    ">Scissors</button>
    
    <script>
      function playGame(userPick) {
        const computerPick = pickComputerMove();
        let result = '';

        if (userPick === 'Rock') {
          if (computerPick === 'Rock') {
            result = 'Tie.';
          } else if (computerPick === 'Paper') {
            result = 'You Lose.';
          } else {
            result = 'You Win.';
          }
        } else if ( userPick === 'Paper') {
          if (computerPick === 'Rock') {
            result = 'You Win.';
          } else if (computerPick === 'Paper') {
            result = 'Tie.';
          } else {
            result = 'You Lose.';
          }
        } else if (userPick === 'Scissors') {
          if (computerPick === 'Rock') {
            result = 'You Lose.';
          } else if (computerPick === 'Paper') {
            result = 'You Win.';
          } else {
            result = 'Tie.';
          }
        }

        alert(`Computer picked ${computerPick}. You picked ${userPick}. ${result}`);
      }

      function pickComputerMove() {
        const randomNumber = Math.random();
        let computerPick = '';
        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerPick = 'Rock';
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerPick = 'Paper';
        } else {
          computerPick = 'Scissors';
        }
        return computerPick;
      }
    </script>
  </body>
</html>
