<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    <button onclick="
      userPick = 'Rock';
      randomNumber = Math.random();
      if (randomNumber >= 0 && randomNumber < 1 / 3) {
        computerPick = 'Rock';
      } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
        computerPick = 'Paper';
      } else {
        computerPick = 'Scissors';
      }
      if (computerPick === 'Rock') {
        result = 'Tie';
      } else if (computerPick === 'Paper') {
        result = 'You lose';
      } else {
        result = 'You Win';
      }
      alert(`You picked ${userPick}. Computer picked ${computerPick}. ${result}.`);
    ">Rock</button>
    <button onclick="
      userPick = 'Paper';
      randomNumber = Math.random();
      if (randomNumber >= 0 && randomNumber < 1 / 3) {
        computerPick = 'Rock';
      } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
        computerPick = 'Paper';
      } else {
        computerPick = 'Scissors';
      }
      if (computerPick === 'Rock') {
        result = 'You Win';
      } else if (computerPick === 'Paper') {
        result = 'Tie';
      } else {
        result = 'You lose';
      }
      alert(`You picked ${userPick}. Computer picked ${computerPick}. ${result}.`);
    ">Paper</button>
    <button onclick="
      userPick = 'Scissors';
      randomNumber = Math.random();
      if (randomNumber >= 0 && randomNumber < 1 / 3) {
        computerPick = 'Rock';
      } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
        computerPick = 'Paper';
      } else {
        computerPick = 'Scissors';
      }
      if (computerPick === 'Rock') {
        result = 'You lose';
      } else if (computerPick === 'Paper') {
        result = 'You Win';
      } else {
        result = 'Tie';
      }
      alert(`You picked ${userPick}. Computer picked ${computerPick}. ${result}.`);
    ">Scissors</button>
    <script>
      let randomNumber = 0;
      let computerPick = '';
      let userPick = '';
      let result = '';
    </script>
  </body>
</html>
