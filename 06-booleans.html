<!DOCTYPE html>
<html>
  <head>
    <title>Booleans</title>
  </head>
  <body>
    <script>
        console.log(typeof true);
        console.log(3 > 5);
        console.log(5 == '5.00');
        console.log(5 === '5.00');

        if (false) {
          console.log('hello');
        } else {
          console.log('else');
        }

        let age = 15;
        if (age >= 16) {
          console.log('you can drive');
          console.log('congrats');
        } else if (age >= 14) {
          console.log('almost there');
        } else {
          console.log('you cannot drive');
        }
    </script>
  </body>
</html>
